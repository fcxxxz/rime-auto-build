name: watch-upstream

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: watch-upstream
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install powershell-yaml
        shell: pwsh
        run: Install-Module -Name powershell-yaml -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Probe upstream
        id: probe
        shell: pwsh
        run: ./scripts/probe-upstream.ps1

      - name: Diff state
        id: diff
        shell: pwsh
        env:
          PROBED_JSON: ${{ steps.probe.outputs.probed }}
        run: ./scripts/diff-state.ps1

      - name: Commit state if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "rime-auto-build-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/last-seen.json
          if ! git diff --cached --quiet; then
            git commit -m "watch: ${{ steps.diff.outputs.summary }}"
            git push
          fi

      - name: Dispatch build
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: upstream-change
          client-payload: |
            {
              "changed_targets": ${{ steps.diff.outputs.changed_targets }}
            }
