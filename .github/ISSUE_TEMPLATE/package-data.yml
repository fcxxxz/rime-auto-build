name: 一次性打包 Rime 方案
description: 填一个公开 GitHub Rime 方案仓库，机器人自动打包
title: "Package: "
labels:
  - package request
body:
  - type: input
    id: repository
    attributes:
      label: 公开 GitHub 仓库
      description: 填 Rime 方案仓库地址。只支持公开仓库，方案短名和显示名会自动从仓库名推导。
      placeholder: https://github.com/user/rime-data
    validations:
      required: true

  - type: input
    id: ref
    attributes:
      label: 分支、标签或 commit
      description: 可选。留空时使用这个仓库的默认分支。
      placeholder: 留空即可
    validations:
      required: false

  - type: dropdown
    id: weasel
    attributes:
      label: 小狼毫版本
      description: 只能选一个。
      options:
        - 官方小狼毫（rime）
        - 晴版小狼毫（qing）
        - fxliang 小狼毫（fxliang）
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: 确认
      options:
        - label: 我确认这是公开 Rime 方案仓库，并知道安装包会作为临时 GitHub Actions Artifact 上传。
          required: true
